# Nginx vhost untuk finance.eccchurch.global
#
# Initial state: HTTP-only di port 80, dengan proxy_pass ke Next.js.
# Certbot akan otomatis tambah block 443 SSL + redirect HTTP→HTTPS saat issue cert.
#
# Setup:
#   sudo cp deploy/nginx-vhost.conf /etc/nginx/sites-available/ecc-finance
#   sudo ln -sf /etc/nginx/sites-available/ecc-finance /etc/nginx/sites-enabled/
#   sudo rm -f /etc/nginx/sites-enabled/default
#   sudo nginx -t && sudo systemctl reload nginx
#
# Issue SSL setelah DNS sudah point ke server:
#   sudo certbot --nginx -d finance.eccchurch.global --non-interactive --agree-tos -m admin@eccchurch.global
#
# Certbot akan modify file ini dengan add:
#   - server block 443 (SSL)
#   - port 80 jadi redirect ke 443

server {
    listen 80;
    listen [::]:80;
    server_name finance.eccchurch.global;

    # ── ACME challenge directory untuk Let's Encrypt ──
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # ── Security headers (akan ditingkatkan setelah SSL aktif) ──
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Body size: izinkan upload file mutasi sampai 20MB ──
    client_max_body_size 20M;
    client_body_timeout 300s;

    # ── Logs ──
    access_log /var/log/nginx/ecc-finance-access.log;
    error_log  /var/log/nginx/ecc-finance-error.log warn;

    # ── Compression ──
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml
               application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── Next.js static assets (cached aggressive) ──
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Public assets ──
    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Main app reverse proxy ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # ── Timeouts (5 menit) ──
        # Upload mutasi + LLM bootstrap parser bisa makan 30-90 detik.
        # Default nginx 60s memutus koneksi mid-stream → ERR_INCOMPLETE_CHUNKED_ENCODING.
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 300s;
        send_timeout 300s;

        # ── Streaming-friendly ──
        # Matikan buffering supaya response Next.js (server action call LLM)
        # langsung flush ke browser, nggak ditahan di buffer sampai timeout.
        proxy_buffering off;
        proxy_request_buffering off;
    }
}
