# Nginx vhost untuk finance.eccchurch.global
# Copy ke /etc/nginx/sites-available/ecc-finance lalu symlink ke sites-enabled.
#
#   sudo cp deploy/nginx-vhost.conf /etc/nginx/sites-available/ecc-finance
#   sudo ln -s /etc/nginx/sites-available/ecc-finance /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Lalu issue SSL cert:
#   sudo certbot --nginx -d finance.eccchurch.global

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    listen [::]:80;
    server_name finance.eccchurch.global;

    # Untuk Let's Encrypt verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect semua HTTP ke HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server (Next.js reverse proxy) ──
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name finance.eccchurch.global;

    # SSL cert (di-isi otomatis oleh certbot — placeholder)
    # ssl_certificate     /etc/letsencrypt/live/finance.eccchurch.global/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/finance.eccchurch.global/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # ── Security headers ──
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Body size: izinkan upload file mutasi sampai 20MB ──
    client_max_body_size 20M;
    client_body_timeout 60s;

    # ── Logs ──
    access_log /var/log/nginx/ecc-finance-access.log;
    error_log  /var/log/nginx/ecc-finance-error.log warn;

    # ── Compression ──
    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml
               application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ── Next.js static assets (cached aggressive) ──
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Public assets (images dll) ──
    location /images/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # ── Main app reverse proxy ──
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
